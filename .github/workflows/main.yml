<body>

  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <div class="logo-icon">🏠</div>
        خانه من
      </div>
      <nav class="nav">
        <a href="index.html">خانه</a>
        <a href="properties.html">املاک</a>
        <a href="about.html" class="active">درباره ما</a>
        <a href="contact.html">تماس</a>
      </nav>
      <div class="header-actions">
        <a href="properties.html" class="btn btn-ghost">جستجو</a>
        <a href="contact.html" class="btn btn-primary">مشاوره رایگان</a>
        <div class="mobile-toggle">☰</div>
      </div>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1>درباره ما</h1>
      <p>آشنایی با تیم حرفه‌ای خانه من</p>
    </div>
  </div>

  <section class="section about-hero">
    <div class="container">
      <div class="about-content fade-in">
        <p>خانه من در سال ۱۳۹۴ با هدف متحول کردن صنعت خرید و فروش ملک در ایران آغاز به کار کرد. ما معتقدیم پیدا کردن «خانه رویایی» نباید یک فرآیند طاقت‌فرسا و پیچیده باشد.</p>
        <p>تیم ما متشکل از مشاوران املاک حرفه‌ای، کارشناسان حقوقی، طراحان و برنامه‌نویسان است که با همکاری هم سامانه‌ای هوشمند و کاربرپسند برای جستجو، مقایسه و انتخاب بهترین املاک ایجاد کرده‌ایم.</p>
        <p>با بیش از ۱۸۰۰ معامله موفق و رضایت ۹۵ درصدی مشتریان، مفتخریم که یکی از معتبرترین سامانه‌های املاک در ایران هستیم.</p>
      </div>

      <div class="values-grid">
        <div class="value-card fade-in">
          <div class="value-icon">🤝</div>
          <h3>اعتماد</h3>
          <p>شفافیت کامل در همه معاملات و ارائه اطلاعات دقیق و واقعی از هر ملک</p>
        </div>
        <div class="value-card fade-in">
          <div class="value-icon">⚡</div>
          <h3>سرعت</h3>
          <p>فرآیند سریع خرید و فروش با استفاده از فناوری‌های نوین و تیم مجرب</p>
        </div>
        <div class="value-card fade-in">
          <div class="value-icon">🎯</div>
          <h3>دقت</h3>
          <p>تطبیق دقیق نیازهای شما با بهترین گزینه‌های موجود در بازار</p>
        </div>
        <div class="value-card fade-in">
          <div class="value-icon">💎</div>
          <h3>کیفیت</h3>
          <p>انتخاب دقیق و سخت‌گیرانه املاک توسط تیم کارشناسی حرفه‌ای</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-about">
          <div class="logo">
            <div class="logo-icon">🏠</div>
            خانه من
          </div>
          <p>سامانه خرید، فروش و رهن املاک در تهران و کرج.</p>
          <div class="footer-social">
            <a href="#" title="اینستاگرام">📷</a>
            <a href="#" title="تلگرام">✈️</a>
            <a href="#" title="واتساپ">💬</a>
            <a href="#" title="لینکدین">💼</a>
          </div>
        </div>
        <div>
          <h4>دسترسی سریع</h4>
          <ul class="footer-links">
            <li><a href="index.html">خانه</a></li>
            <li><a href="properties.html">لیست املاک</a></li>
            <li><a href="about.html">درباره ما</a></li>
            <li><a href="contact.html">تماس با ما</a></li>
          </ul>
        </div>
        <div>
          <h4>نوع ملک</h4>
          <ul class="footer-links">
            <li><a href="properties.html?type=apartment">آپارتمان</a></li>
            <li><a href="properties.html?type=villa">ویلا</a></li>
            <li><a href="properties.html?type=commercial">تجاری</a></li>
            <li><a href="properties.html?type=land">زمین</a></li>
          </ul>
        </div>
        <div>
          <h4>اطلاعات تماس</h4>
          <ul class="footer-links">
            <li>تهران، خیابان ولیعصر</li>
            <li>۰۲۱-۱۲۳۴۵۶۷۸</li>
            <li>info@khaneh-man.ir</li>
            <li>شنبه تا پنجشنبه ۹ تا ۲۱</li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <span>© ۱۴۰۳ - تمامی حقوق محفوظ است | خانه من</span>
        <span>طراحی و توسعه با ❤️</span>
      </div>
    </div>
