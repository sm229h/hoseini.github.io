        </div>
        <div class="contact-card">
          <div class="contact-icon">💬</div>
          <div>
            <h4>شبکه‌های اجتماعی</h4>
            <p>اینستاگرام: @khaneh.man<br>تلگرام: khaneh_man</p>
          </div>
        </div>
      </div>

      <div class="contact-form fade-in">
        <h3>فرم مشاوره رایگان</h3>
        <form onsubmit="event.preventDefault(); alert('درخواست شما با موفقیت ثبت شد. همکاران ما به زودی با شما تماس می‌گیرند.');">
          <div class="form-group">
            <label>نام و نام خانوادگی</label>
            <input type="text" placeholder="مثلاً علی محمدی" required />
          </div>
          <div class="form-group">
            <label>شماره تماس</label>
            <input type="tel" placeholder="مثلاً ۰۹۱۲۳۴۵۶۷۸۹" required />
          </div>
          <div class="form-group">
            <label>ایمیل (اختیاری)</label>
            <input type="email" placeholder="example@email.com" />
          </div>
          <div class="form-group">
            <label>نوع مشاوره</label>
            <select>
              <option value="">انتخاب کنید</option>
              <option value="buy">خرید ملک</option>
              <option value="sell">فروش ملک</option>
              <option value="rent">رهن و اجاره</option>
              <option value="invest">سرمایه‌گذاری</option>
              <option value="other">سایر</option>
            </select>
          </div>
          <div class="form-group">
            <label>توضیحات</label>
            <textarea placeholder="نیازها و خواسته‌های خود را بنویسید..."></textarea>
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-primary">ثبت درخواست</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-about">
          <div class="logo">
            <div class="logo-icon">🏠</div>
            خانه من
          </div>
          <p>سامانه خرید، فروش و رهن املاک در تهران و کرج.</p>
          <div class="footer-social">
            <a href="#" title="اینستاگرام">📷</a>
            <a href="#" title="تلگرام">✈️</a>
            <a href="#" title="واتساپ">💬</a>
            <a href="#" title="لینکدین">💼</a>
          </div>
        </div>
        <div>
          <h4>دسترسی سریع</h4>
          <ul class="footer-links">
            <li><a href="index.html">خانه</a></li>
            <li><a href="properties.html">لیست املاک</a></li>
            <li><a href="about.html">درباره ما</a></li>
            <li><a href="contact.html">تماس با ما</a></li>
