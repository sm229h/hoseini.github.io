      max-width: 800px;
      margin: 0 auto;
    }
    .about-content p {
      font-size: 16px;
      line-height: 2.2;
      color: var(--text-light);
      margin-bottom: 20px;
    }
    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }
    .value-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .value-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }
    .value-card h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .value-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.8;
    }
  </style>
