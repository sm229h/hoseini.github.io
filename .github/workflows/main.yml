  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      padding: 40px 0 80px;
    }
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .contact-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .contact-icon {
      width: 56px;
      height: 56px;
      background: rgba(212,168,83,0.1);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .contact-card h4 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .contact-card p {
      font-size: 14px;
      color: var(--text-light);
    }
    .contact-form {
      background: var(--bg-white);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
    }
    .contact-form h3 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--primary-dark);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid #e0e0e0;
      background: var(--bg);
      font-size: 14px;
      color: var(--text);
      transition: var(--transition);
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,168,83,0.15);
    }
    .form-group textarea {
      height: 120px;
      resize: vertical;
    }
    .form-group .btn {
      width: 100%;
      justify-content: center;
      padding: 14px;
    }
    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <div class="logo-icon">🏠</div>
        خانه من
      </div>
      <nav class="nav">
        <a href="index.html">خانه</a>
        <a href="properties.html">املاک</a>
        <a href="about.html">درباره ما</a>
        <a href="contact.html" class="active">تماس</a>
      </nav>
      <div class="header-actions">
        <a href="properties.html" class="btn btn-ghost">جستجو</a>
        <a href="contact.html" class="btn btn-primary">مشاوره رایگان</a>
        <div class="mobile-toggle">☰</div>
      </div>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1>تماس با ما</h1>
      <p>همراه شما در پیدا کردن خانه رویایتان</p>
    </div>
  </div>

  <div class="container">
    <div class="contact-grid">
      <div class="contact-info fade-in">
        <div class="contact-card">
          <div class="contact-icon">📍</div>
          <div>
            <h4>آدرس دفتر مرکزی</h4>
            <p>تهران، خیابان ولیعصر، بالاتر از چهارراه پارک‌وی، ساختمان خانه من، طبقه ۵</p>
          </div>
        </div>
        <div class="contact-card">
          <div class="contact-icon">📞</div>
          <div>
            <h4>شماره تماس</h4>
            <p>۰۲۱-۱۲۳۴۵۶۷۸<br>۰۲۱-۸۷۶۵۴۳۲۱</p>
          </div>
        </div>
        <div class="contact-card">
          <div class="contact-icon">✉️</div>
          <div>
